<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>COBRA PANEL</title>

<style>
body{margin:0;font-family:sans-serif;background:linear-gradient(135deg,#7c3aed,#ec4899);color:white;}
.login{height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;}
.login input{width:80%;padding:14px;margin:8px;border:none;border-radius:25px;}
.login button{width:80%;padding:14px;border:none;border-radius:25px;background:#ec4899;color:white;}
.panel{display:none;}
.top{background:#111827;padding:15px;text-align:center;}
.menu{display:flex;background:#1f2937;}
.menu button{flex:1;padding:12px;border:none;background:none;color:white;}
.content{padding:10px;}
.card{background:#1e293b;margin:8px;padding:10px;border-radius:10px;}
.btn{padding:10px;border:none;border-radius:10px;margin:5px;}
.green{background:#22c55e;} .red{background:#ef4444;} .blue{background:#3b82f6;}
</style>

</head>
<body>

<div class="login" id="login">
  <h2>COBRA PANEL</h2>
  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">
  <button onclick="login()">Sign In</button>
</div>

<div class="panel" id="panel">

<div class="top">COBRA ADMIN</div>

<div class="menu">
  <button onclick="show('dash')">Dashboard</button>
  <button onclick="show('gen')">Generate</button>
</div>

<div class="content">

<div id="dash">
  <h3>📊 LIVE KEYS</h3>
  <button class="btn blue" onclick="load()">Refresh</button>
  <div id="list"></div>
</div>

<div id="gen" style="display:none;">
  <h3>🔑 GENERATE</h3>
  <button class="btn green" onclick="gen(1,1)">1 DAY</button>
  <button class="btn green" onclick="gen(7,1)">7 DAY</button>

  <input id="days" placeholder="Days">
  <input id="limit" placeholder="Device limit">
  <input id="custom" placeholder="Custom key">

  <button class="btn green" onclick="customGen()">CREATE</button>
</div>

</div>
</div>

<script>
const API="https://cobra-pannel.onrender.com";

function head(){
  return {
    "Content-Type":"application/json",
    "user":document.getElementById("user").value.trim(),
    "pass":document.getElementById("pass").value.trim()
  }
}

function login(){
  fetch(API+"/keys",{headers:head()})
  .then(res=>{
    if(res.status===200){
      document.getElementById("login").style.display="none";
      document.getElementById("panel").style.display="block";
      load();
    }else{
      alert("Login Failed");
    }
  });
}

function show(id){
  document.getElementById("dash").style.display="none";
  document.getElementById("gen").style.display="none";
  document.getElementById(id).style.display="block";
}

function load(){
  fetch(API+"/keys",{headers:head()})
  .then(r=>r.json())
  .then(data=>{
    document.getElementById("list").innerHTML=data.map(k=>`
      <div class="card">
      <b>${k.key}</b><br>
      ${k.devices.length}/${k.deviceLimit}<br>
      <button class="btn blue" onclick="resetKey('${k.key}')">Reset</button>
      <button class="btn red" onclick="delKey('${k.key}')">Delete</button>
      </div>
    `).join("");
  });
}

function gen(days,limit){
  fetch(API+"/generate",{
    method:"POST",
    headers:head(),
    body:JSON.stringify({days,deviceLimit:limit})
  })
  .then(r=>r.json())
  .then(d=>{
    alert("KEY: "+d.key);
    load();
  });
}

function customGen(){
  fetch(API+"/generate",{
    method:"POST",
    headers:head(),
    body:JSON.stringify({
      days:+document.getElementById("days").value,
      deviceLimit:+document.getElementById("limit").value,
      customKey:document.getElementById("custom").value
    })
  })
  .then(r=>r.json())
  .then(d=>{
    alert("KEY: "+d.key);
    load();
  });
}

function delKey(key){
  fetch(API+"/delete",{
    method:"POST",
    headers:head(),
    body:JSON.stringify({key})
  }).then(load);
}

function resetKey(key){
  fetch(API+"/reset",{
    method:"POST",
    headers:head(),
    body:JSON.stringify({key})
  }).then(load);
}
</script>

</body>
</html>
