<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COBRA PANEL</title>

<style>
body{margin:0;font-family:sans-serif;background:#0f172a;color:white}

/* LOGIN */
.login{
height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;
}
.login input{
width:80%;padding:12px;margin:6px;border:none;border-radius:20px;
}
.login button{
width:80%;padding:12px;border:none;border-radius:20px;background:#22c55e;color:white;
}

/* MENU */
.menu{
position:fixed;left:-220px;top:0;width:220px;height:100%;
background:#111827;padding:10px;transition:0.3s;
}
.menu button{
width:100%;padding:12px;margin:5px;border:none;background:#1f2937;color:white;border-radius:8px;
}

.menu.show{left:0;}

.top{
background:#111827;padding:12px;text-align:center;
}

.open{
position:absolute;left:10px;top:10px;
}

/* CONTENT */
.content{padding:10px;margin-top:50px}

.card{
background:#1e293b;padding:10px;margin:8px;border-radius:10px;
}

/* PLAN BOX */
.plans{
display:grid;grid-template-columns:repeat(2,1fr);gap:8px;
}
.plan{
background:#22c55e;padding:10px;border-radius:8px;text-align:center;
}

input{
width:95%;padding:10px;margin:5px;border:none;border-radius:8px;
}

button{
padding:10px;border:none;border-radius:8px;margin:5px;
}

.blue{background:#3b82f6;}
.red{background:#ef4444;}
.green{background:#22c55e;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="login">
<h3>COBRA PANEL</h3>
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">LOGIN</button>
</div>

<!-- MENU -->
<div id="menu" class="menu">
<button onclick="show('dash')">Dashboard</button>
<button onclick="show('gen')">Generate Key</button>
<button onclick="show('custom')">Custom Key</button>
</div>

<!-- PANEL -->
<div id="panel" style="display:none">

<div class="top">
<button class="open" onclick="toggle()">☰</button>
COBRA ADMIN
</div>

<div class="content">

<!-- DASHBOARD -->
<div id="dash">
<h3>📊 LIVE KEYS</h3>
<button class="blue" onclick="load()">Refresh</button>
<div id="list"></div>
</div>

<!-- GENERATE RANDOM -->
<div id="gen" style="display:none">
<h3>🔑 RANDOM KEY</h3>

<div class="plans">
<div class="plan" onclick="setPlan(1/24)">1H</div>
<div class="plan" onclick="setPlan(2/24)">2H</div>
<div class="plan" onclick="setPlan(12/24)">12H</div>
<div class="plan" onclick="setPlan(1)">1D</div>
<div class="plan" onclick="setPlan(7)">7D</div>
<div class="plan" onclick="setPlan(30)">30D</div>
</div>

<input id="device" placeholder="Device limit (1 default)">
<button class="green" onclick="gen()">GENERATE</button>

<div id="out"></div>
</div>

<!-- CUSTOM -->
<div id="custom" style="display:none">
<h3>✍️ CUSTOM KEY</h3>

<div class="plans">
<div class="plan" onclick="setPlan(1)">1D</div>
<div class="plan" onclick="setPlan(7)">7D</div>
<div class="plan" onclick="setPlan(30)">30D</div>
</div>

<input id="cdevice" placeholder="Device limit">
<input id="ckey" placeholder="Enter custom key">

<button class="green" onclick="customGen()">GENERATE</button>

<div id="cout"></div>
</div>

</div>
</div>

<script>

const API="https://cobra-pannel.onrender.com";
let PLAN=1;

// LOGIN
function login(){
fetch(API+"/keys",{
headers:{
"user":user.value.trim(),
"pass":pass.value.trim()
}})
.then(r=>{
if(r.status===200){
login.style.display="none";
panel.style.display="block";
load();
}else{
alert("Login Failed");
}
});
}

// MENU
function toggle(){
menu.classList.toggle("show");
}

// SWITCH
function show(id){
dash.style.display="none";
gen.style.display="none";
custom.style.display="none";
document.getElementById(id).style.display="block";
menu.classList.remove("show");
}

// PLAN
function setPlan(d){
PLAN=d;
alert("Plan Selected");
}

// LOAD KEYS
function load(){
fetch(API+"/keys",{headers:{
"user":user.value.trim(),
"pass":pass.value.trim()
}})
.then(r=>r.json())
.then(data=>{
list.innerHTML=data.map(k=>{
let exp=new Date(k.expiry);
let status=new Date()>exp?"❌":"✅";
return `<div class="card">
<b>${k.key}</b><br>
${k.devices.length}/${k.deviceLimit}<br>
${exp.toLocaleString()}<br>
${status}<br>
<button onclick="copy('${k.key}')">COPY</button>
<button class="blue" onclick="resetKey('${k.key}')">Reset</button>
<button class="red" onclick="delKey('${k.key}')">Delete</button>
</div>`;
}).join("");
});
}

// RANDOM GEN
function gen(){
let d=+device.value||1;
fetch(API+"/generate",{
method:"POST",
headers:{
"user":user.value.trim(),
"pass":pass.value.trim(),
"Content-Type":"application/json"
},
body:JSON.stringify({days:PLAN,deviceLimit:d})
})
.then(r=>r.json())
.then(d=>{
out.innerHTML=`<div class="card">${d.key}<br><button onclick="copy('${d.key}')">COPY</button></div>`;
});
}

// CUSTOM GEN
function customGen(){
fetch(API+"/generate",{
method:"POST",
headers:{
"user":user.value.trim(),
"pass":pass.value.trim(),
"Content-Type":"application/json"
},
body:JSON.stringify({
days:PLAN,
deviceLimit:+cdevice.value||1,
customKey:ckey.value
})
})
.then(r=>r.json())
.then(d=>{
cout.innerHTML=`<div class="card">${d.key}<br><button onclick="copy('${d.key}')">COPY</button></div>`;
});
}

// DELETE
function delKey(k){
fetch(API+"/delete",{
method:"POST",
headers:{
"user":user.value.trim(),
"pass":pass.value.trim(),
"Content-Type":"application/json"
},
body:JSON.stringify({key:k})
}).then(load);
}

// RESET
function resetKey(k){
fetch(API+"/reset",{
method:"POST",
headers:{
"user":user.value.trim(),
"pass":pass.value.trim(),
"Content-Type":"application/json"
},
body:JSON.stringify({key:k})
}).then(load);
}

// COPY
function copy(k){
navigator.clipboard.writeText(k);
alert("Copied");
}

</script>

</body>
</html>
