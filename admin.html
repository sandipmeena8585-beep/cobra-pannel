<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COBRA PANEL</title>

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:#fff}
.login{height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center}
.login input,.login button{width:80%;padding:14px;margin:6px;border:none;border-radius:10px}
.login button{background:#22c55e}

.menuBtn{display:none;position:fixed;top:10px;left:10px}
.sidebar{position:fixed;left:-220px;width:200px;height:100%;background:#111827;padding:10px;transition:.3s}
.sidebar button{width:100%;padding:10px;margin:5px;background:#1f2937;color:#fff;border:none;border-radius:8px}

.panel{display:none}
.card{background:#1e293b;margin:8px;padding:10px;border-radius:10px}
.plan{padding:10px;background:#22c55e;margin:5px;border-radius:6px}
</style>
</head>

<body>

<div class="login" id="loginBox">
<input id="user" placeholder="USERNAME">
<input id="pass" type="password" placeholder="PASSWORD">
<button onclick="login()">LOGIN</button>
</div>

<button class="menuBtn" id="menuBtn" onclick="toggleMenu()">☰</button>

<div id="sidebar" class="sidebar">
<button onclick="show('dash')">DASHBOARD</button>
<button onclick="show('gen')">GENERATE</button>
<button onclick="logout()">LOGOUT</button>
</div>

<div class="panel" id="panel">

<div id="dash">
<h3>LIVE KEYS</h3>
<button onclick="load()">REFRESH</button>
<div id="list"></div>
</div>

<div id="gen" style="display:none">
<h3>SELECT PLAN</h3>

<div onclick="setPlan('1H')" class="plan">1H</div>
<div onclick="setPlan('3H')" class="plan">3H</div>
<div onclick="setPlan('5H')" class="plan">5H</div>
<div onclick="setPlan('12H')" class="plan">12H</div>
<div onclick="setPlan('1DAY')" class="plan">1DAY</div>
<div onclick="setPlan('7DAY')" class="plan">7DAY</div>
<div onclick="setPlan('15DAY')" class="plan">15DAY</div>
<div onclick="setPlan('30DAY')" class="plan">30DAY</div>
<div onclick="setPlan('60DAY')" class="plan">60DAY</div>

<div id="p" class="card">PLAN: NONE</div>

<input id="limit" placeholder="DEVICE LIMIT">
<input id="custom" placeholder="CUSTOM KEY">

<button onclick="gen()">GENERATE</button>
<div id="out"></div>

</div>

</div>

<script>
const API="https://cobra-pannel.onrender.com";

function head(){
return {user:user.value,pass:pass.value};
}

let PLAN=null;

function login(){
fetch(API+"/keys",{headers:head()})
.then(r=>{
if(r.status===200){
loginBox.style.display="none";
panel.style.display="block";
menuBtn.style.display="block";
load();
}else alert("wrong");
});
}

function toggleMenu(){
sidebar.style.left=sidebar.style.left==="0px"?"-220px":"0px";
}

function show(id){
dash.style.display="none";
gen.style.display="none";
document.getElementById(id).style.display="block";
toggleMenu();
}

function logout(){location.reload();}

function setPlan(p){
PLAN=p;
document.getElementById("p").innerText="PLAN: "+p;
}

function gen(){
fetch(API+"/generate",{
method:"POST",
headers:{...head(),"Content-Type":"application/json"},
body:JSON.stringify({
plan:PLAN,
deviceLimit:+limit.value||1,
customKey:custom.value
})
})
.then(r=>r.json())
.then(d=>{
out.innerHTML=d.key;
load();
});
}

function load(){
fetch(API+"/keys",{headers:head()})
.then(r=>r.json())
.then(d=>{
list.innerHTML=d.map(k=>`
<div class="card">
${k.key}<br>
${k.devices.length}/${k.deviceLimit}<br>
${new Date(k.expiry).toLocaleString()}<br>

<button onclick="del('${k.key}')">DEL</button>
<button onclick="reset('${k.key}')">RESET</button>
<button onclick="extend('${k.key}')">+7D</button>
</div>
`).join("");
});
}

function del(k){
fetch(API+"/delete",{method:"POST",headers:{...head(),"Content-Type":"application/json"},body:JSON.stringify({key:k})}).then(load);
}
function reset(k){
fetch(API+"/reset",{method:"POST",headers:{...head(),"Content-Type":"application/json"},body:JSON.stringify({key:k})}).then(load);
}
function extend(k){
fetch(API+"/extend",{method:"POST",headers:{...head(),"Content-Type":"application/json"},body:JSON.stringify({key:k,days:7})}).then(load);
}
</script>

</body>
</html>
