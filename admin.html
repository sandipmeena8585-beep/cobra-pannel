<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>COBRA PANEL</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#7c3aed,#ec4899);
  color:white;
}

/* LOGIN */
.login{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.login input{
  width:80%;
  padding:14px;
  margin:8px;
  border:none;
  border-radius:25px;
}

.login button{
  width:80%;
  padding:14px;
  border:none;
  border-radius:25px;
  background:#ec4899;
  color:white;
}

/* PANEL */
.panel{display:none;}

.top{
  background:#111827;
  padding:15px;
  text-align:center;
  font-size:18px;
}

.menu{
  display:flex;
  justify-content:space-around;
  background:#1f2937;
}

.menu button{
  flex:1;
  padding:12px;
  border:none;
  background:none;
  color:white;
}

.content{padding:10px;}

.card{
  background:#1e293b;
  margin:8px;
  padding:10px;
  border-radius:10px;
}

.btn{
  padding:10px;
  border:none;
  border-radius:10px;
  margin:5px;
}

.green{background:#22c55e;}
.red{background:#ef4444;}
.blue{background:#3b82f6;}
</style>

</head>
<body>

<!-- LOGIN -->
<div class="login" id="login">
  <h2>COBRA PANEL</h2>
  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">
  <button onclick="login()">Sign In</button>
</div>

<!-- PANEL -->
<div class="panel" id="panel">

<div class="top">COBRA ADMIN</div>

<div class="menu">
  <button onclick="show('dash')">Dashboard</button>
  <button onclick="show('gen')">Generate</button>
</div>

<div class="content">

<!-- DASHBOARD -->
<div id="dash">
  <h3>📊 LIVE KEYS</h3>
  <button class="btn blue" onclick="load()">Refresh</button>
  <div id="list"></div>
</div>

<!-- GENERATE -->
<div id="gen" style="display:none;">
  <h3>🔑 GENERATE KEY</h3>

  <button class="btn green" onclick="gen(1/24,1)">1H</button>
  <button class="btn green" onclick="gen(12/24,1)">12H</button>
  <button class="btn green" onclick="gen(1,1)">1 DAY</button>
  <button class="btn green" onclick="gen(7,1)">7 DAY</button>
  <button class="btn green" onclick="gen(30,1)">30 DAY</button>

  <h4>Custom</h4>
  <input id="days" placeholder="Days">
  <input id="limit" placeholder="Device limit">
  <input id="custom" placeholder="Custom key">

  <button class="btn green" onclick="customGen()">CREATE</button>
</div>

</div>

</div>

<script>

const API="https://cobra-pannel.onrender.com";

function head(){
  return {
    "Content-Type":"application/json",
    "user":document.getElementById("user").value,
    "pass":document.getElementById("pass").value
  }
}

// LOGIN
function login(){
  fetch(API+"/keys",{headers:head()})
  .then(res=>{
    if(res.status===200){
      login.style.display="none";
      panel.style.display="block";
      load();
    }else{
      alert("Login Failed");
    }
  });
}

// MENU SWITCH
function show(id){
  document.getElementById("dash").style.display="none";
  document.getElementById("gen").style.display="none";
  document.getElementById(id).style.display="block";
}

// LOAD KEYS
function load(){
  fetch(API+"/keys",{headers:head()})
  .then(r=>r.json())
  .then(data=>{
    list.innerHTML=data.map(k=>`
      <div class="card">
      <b>${k.key}</b><br>
      ${k.devices.length}/${k.deviceLimit}<br>
      Expiry: ${new Date(k.expiry).toLocaleString()}<br>
      <button class="btn blue" onclick="resetKey('${k.key}')">Reset</button>
      <button class="btn red" onclick="delKey('${k.key}')">Delete</button>
      </div>
    `).join("");
  });
}

// GENERATE
function gen(days,limit){
  fetch(API+"/generate",{
    method:"POST",
    headers:head(),
    body:JSON.stringify({days,deviceLimit:limit})
  })
  .then(r=>r.json())
  .then(d=>{
    navigator.clipboard.writeText(d.key);
    alert("KEY: "+d.key);
    load();
  });
}

// CUSTOM
function customGen(){
  fetch(API+"/generate",{
    method:"POST",
    headers:head(),
    body:JSON.stringify({
      days:+days.value,
      deviceLimit:+limit.value,
      customKey:custom.value
    })
  })
  .then(r=>r.json())
  .then(d=>{
    navigator.clipboard.writeText(d.key);
    alert("KEY: "+d.key);
    load();
  });
}

// DELETE
function delKey(key){
  fetch(API+"/delete",{
    method:"POST",
    headers:head(),
    body:JSON.stringify({key})
  }).then(load);
}

// RESET
function resetKey(key){
  fetch(API+"/reset",{
    method:"POST",
    headers:head(),
    body:JSON.stringify({key})
  }).then(load);
}

</script>

</body>
</html>
