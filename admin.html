<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>COBRA PANEL</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:#fff;
overflow-x:hidden;
}

/* LOGIN */
.login{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}
.login input{
width:80%;
padding:14px;
margin:8px;
border:none;
border-radius:12px;
}
.login button{
width:80%;
padding:14px;
border:none;
border-radius:12px;
background:#22c55e;
color:#fff;
}

/* MENU */
.menuBtn{
display:none;
position:fixed;
top:10px;
left:10px;
background:#111827;
color:#fff;
padding:8px;
border:none;
border-radius:8px;
z-index:1000;
}

/* SIDEBAR */
.sidebar{
position:fixed;
left:-230px;
top:0;
width:200px;
height:100%;
background:#111827;
padding:10px;
transition:.3s;
z-index:999;
}
.sidebar button{
width:100%;
padding:12px;
margin:5px;
background:#1f2937;
color:#fff;
border:none;
border-radius:10px;
}

/* PANEL */
.panel{display:none;}
.top{
text-align:center;
padding:15px;
background:#111827;
font-weight:bold;
}

.content{padding:10px;}

.card{
background:#1e293b;
padding:12px;
margin:8px;
border-radius:12px;
}

/* BUTTON */
button{
padding:10px;
border:none;
border-radius:10px;
margin:5px;
}
.green{background:#22c55e;}
.red{background:#ef4444;}
.blue{background:#3b82f6;}

/* PLAN */
.plan{
padding:10px;
background:#22c55e;
margin:5px;
border-radius:8px;
text-align:center;
}
.plan:active{background:#16a34a;}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="loginBox">
<input id="user" placeholder="USERNAME">
<input id="pass" type="password" placeholder="PASSWORD">
<button onclick="login()">LOGIN</button>
</div>

<!-- MENU BTN -->
<button class="menuBtn" id="menuBtn" onclick="toggleMenu()">☰</button>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">
<button onclick="show('dash')">DASHBOARD</button>
<button onclick="show('gen')">GENERATE KEY</button>
<button onclick="logout()" class="red">LOGOUT</button>
</div>

<!-- PANEL -->
<div class="panel" id="panel">

<div class="top">COBRA ADMIN</div>

<div class="content">

<!-- DASHBOARD -->
<div id="dash">
<h3>LIVE KEYS</h3>
<button class="blue" onclick="load()">REFRESH</button>
<div id="list"></div>
</div>

<!-- GENERATE -->
<div id="gen" style="display:none;">
<h3>SELECT PLAN</h3>

<div class="plan" onclick="setPlan('1H')">1H</div>
<div class="plan" onclick="setPlan('3H')">3H</div>
<div class="plan" onclick="setPlan('5H')">5H</div>
<div class="plan" onclick="setPlan('12H')">12H</div>
<div class="plan" onclick="setPlan('1DAY')">1DAY</div>
<div class="plan" onclick="setPlan('7DAY')">7DAY</div>
<div class="plan" onclick="setPlan('15DAY')">15DAY</div>
<div class="plan" onclick="setPlan('30DAY')">30DAY</div>
<div class="plan" onclick="setPlan('60DAY')">60DAY</div>

<div id="selectedPlan" class="card">PLAN: NONE</div>

<input id="limit" placeholder="DEVICE LIMIT (default 1)">
<input id="custom" placeholder="CUSTOM KEY (optional)">

<button class="green" onclick="gen()">GENERATE KEY</button>

<div id="out" class="card"></div>
</div>

</div>
</div>

<script>

const API="https://cobra-pannel.onrender.com";

function headers(){
return {
"user":user.value.trim(),
"pass":pass.value.trim()
};
}

let PLAN=null;

// LOGIN
function login(){
fetch(API+"/keys",{headers:headers()})
.then(res=>{
if(res.status===200){
loginBox.style.display="none";
panel.style.display="block";
menuBtn.style.display="block";
load();
}else{
alert("WRONG LOGIN");
}
});
}

// MENU
function toggleMenu(){
sidebar.style.left = sidebar.style.left==="0px" ? "-230px" : "0px";
}

// SWITCH
function show(id){
dash.style.display="none";
gen.style.display="none";
document.getElementById(id).style.display="block";
toggleMenu();
}

// LOGOUT
function logout(){
location.reload();
}

// PLAN
function setPlan(p){
PLAN=p;
selectedPlan.innerText="PLAN: "+p;
}

// GENERATE
function gen(){
if(!PLAN){
alert("SELECT PLAN");
return;
}

fetch(API+"/generate",{
method:"POST",
headers:{...headers(),"Content-Type":"application/json"},
body:JSON.stringify({
plan:PLAN,
deviceLimit:+limit.value||1,
customKey:custom.value
})
})
.then(r=>r.json())
.then(d=>{
out.innerHTML=d.key+"<br><button onclick='copyKey(\""+d.key+"\")'>COPY</button>";
load();
});
}

// LOAD KEYS
function load(){
fetch(API+"/keys",{headers:headers()})
.then(r=>r.json())
.then(data=>{
list.innerHTML=data.map(k=>{
let exp=new Date(k.expiry);
let status=Date.now()>k.expiry?"❌ EXPIRED":"✅ ACTIVE";

return `
<div class="card">
<b>${k.key}</b><br>
Devices: ${k.devices.length}/${k.deviceLimit}<br>
Expiry: ${exp.toLocaleString()}<br>
Status: ${status}<br>

<button onclick="copyKey('${k.key}')">COPY</button>
<button class="blue" onclick="resetKey('${k.key}')">RESET</button>
<button class="red" onclick="deleteKey('${k.key}')">DELETE</button>
<button class="green" onclick="extendKey('${k.key}')">+7D</button>

</div>
`;
}).join("");
});
}

// ACTIONS
function deleteKey(k){
fetch(API+"/delete",{
method:"POST",
headers:{...headers(),"Content-Type":"application/json"},
body:JSON.stringify({key:k})
}).then(load);
}

function resetKey(k){
fetch(API+"/reset",{
method:"POST",
headers:{...headers(),"Content-Type":"application/json"},
body:JSON.stringify({key:k})
}).then(load);
}

function extendKey(k){
fetch(API+"/extend",{
method:"POST",
headers:{...headers(),"Content-Type":"application/json"},
body:JSON.stringify({key:k,days:7})
}).then(load);
}

// COPY
function copyKey(k){
navigator.clipboard.writeText(k);
alert("COPIED");
}

</script>

</body>
</html>
