<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COBRA PANEL</title>

<style>
body{margin:0;font-family:sans-serif;background:linear-gradient(135deg,#7c3aed,#ec4899);color:white}

/* LOGIN */
.login{
height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;
}
.login input{
width:80%;padding:14px;margin:8px;border:none;border-radius:25px;
}
.login button{
width:80%;padding:14px;border:none;border-radius:25px;background:#ec4899;color:white;
}

/* SIDEBAR */
.sidebar{
position:fixed;left:-220px;top:0;width:220px;height:100%;
background:#111827;padding:10px;transition:0.3s;z-index:999;
}
.sidebar button{
width:100%;padding:12px;margin:5px;border:none;background:#1f2937;color:white;border-radius:8px;
}

.menuBtn{
position:fixed;top:10px;left:10px;z-index:1000;
background:#111827;color:white;padding:8px;border:none;border-radius:8px;
}

/* PANEL */
.panel{display:none;}
.top{background:#111827;padding:15px;text-align:center;font-size:18px;}

.content{padding:10px;margin-top:50px;}

.card{background:#1e293b;margin:8px;padding:12px;border-radius:12px;}

.plans{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.plan{padding:12px;border-radius:10px;background:#22c55e;text-align:center;}

input{
width:95%;padding:10px;margin:5px;border:none;border-radius:10px;
}

button{
padding:10px;border:none;border-radius:10px;margin:5px;
}

.blue{background:#3b82f6;}
.red{background:#ef4444;}
.green{background:#22c55e;}
</style>

</head>
<body>

<!-- LOGIN -->
<div class="login" id="login">
<h2>COBRA PANEL</h2>
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">LOGIN</button>
</div>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">
<button onclick="show('dash')">Dashboard</button>
<button onclick="show('gen')">Generate Key</button>
<button onclick="show('custom')">Custom Key</button>
</div>

<button class="menuBtn" onclick="toggleMenu()">☰</button>

<!-- PANEL -->
<div class="panel" id="panel">

<div class="top">COBRA ADMIN</div>

<div class="content">

<!-- DASHBOARD -->
<div id="dash">
<h3>📊 LIVE KEYS</h3>
<button class="blue" onclick="load()">Refresh</button>
<div id="list"></div>
</div>

<!-- GENERATE -->
<div id="gen" style="display:none;">
<h3>🔑 RANDOM KEY</h3>

<div class="plans">
<div class="plan" onclick="setPlan(1/24)">1H</div>
<div class="plan" onclick="setPlan(2/24)">2H</div>
<div class="plan" onclick="setPlan(12/24)">12H</div>
<div class="plan" onclick="setPlan(1)">1D</div>
<div class="plan" onclick="setPlan(7)">7D</div>
<div class="plan" onclick="setPlan(30)">30D</div>
</div>

<input id="device" placeholder="Device limit (default 1)">
<button class="green" onclick="genFinal()">GENERATE KEY</button>

<div id="genOutput"></div>
</div>

<!-- CUSTOM -->
<div id="custom" style="display:none;">
<h3>✍️ CUSTOM KEY</h3>

<div class="plans">
<div class="plan" onclick="setPlan(1)">1D</div>
<div class="plan" onclick="setPlan(7)">7D</div>
<div class="plan" onclick="setPlan(30)">30D</div>
</div>

<input id="cdevice" placeholder="Device limit">
<input id="ckey" placeholder="Enter custom key">

<button class="green" onclick="customFinal()">GENERATE</button>

<div id="customOutput"></div>
</div>

</div>
</div>

<script>

const API="https://cobra-pannel.onrender.com";
let PLAN=1;

// LOGIN
function login(){
fetch(API+"/keys",{
headers:{
"user":document.getElementById("user").value.trim(),
"pass":document.getElementById("pass").value.trim()
}})
.then(r=>{
if(r.status===200){
document.getElementById("login").style.display="none";
document.getElementById("panel").style.display="block";
load();
}else{
alert("Login Failed");
}
});
}

// MENU
function toggleMenu(){
let s=document.getElementById("sidebar");
s.style.left = s.style.left==="0px" ? "-220px" : "0px";
}

// SWITCH
function show(id){
document.getElementById("dash").style.display="none";
document.getElementById("gen").style.display="none";
document.getElementById("custom").style.display="none";
document.getElementById(id).style.display="block";
toggleMenu();
}

// PLAN
function setPlan(p){
PLAN=p;
alert("Plan Selected");
}

// LOAD
function load(){
fetch(API+"/keys",{headers:{
"user":document.getElementById("user").value.trim(),
"pass":document.getElementById("pass").value.trim()
}})
.then(r=>r.json())
.then(data=>{
document.getElementById("list").innerHTML=data.map(k=>{
let exp=new Date(k.expiry);
let status=new Date()>exp?"❌ EXPIRED":"✅ ACTIVE";

return `<div class="card">
<b>${k.key}</b><br>
Devices: ${k.devices.length}/${k.deviceLimit}<br>
Expiry: ${exp.toLocaleString()}<br>
Status: ${status}<br>

<button onclick="copyKey('${k.key}')">COPY</button>
<button class="blue" onclick="resetKey('${k.key}')">Reset</button>
<button class="red" onclick="delKey('${k.key}')">Delete</button>
</div>`;
}).join("");
});
}

// RANDOM GENERATE
function genFinal(){
let d=+document.getElementById("device").value || 1;

fetch(API+"/generate",{
method:"POST",
headers:{
"user":document.getElementById("user").value.trim(),
"pass":document.getElementById("pass").value.trim(),
"Content-Type":"application/json"
},
body:JSON.stringify({days:PLAN,deviceLimit:d})
})
.then(r=>r.json())
.then(d=>{
document.getElementById("genOutput").innerHTML=
`<div class="card">${d.key}<br>
<button onclick="copyKey('${d.key}')">COPY</button></div>`;
});
}

// CUSTOM GENERATE
function customFinal(){
fetch(API+"/generate",{
method:"POST",
headers:{
"user":document.getElementById("user").value.trim(),
"pass":document.getElementById("pass").value.trim(),
"Content-Type":"application/json"
},
body:JSON.stringify({
days:PLAN,
deviceLimit:+document.getElementById("cdevice").value || 1,
customKey:document.getElementById("ckey").value
})
})
.then(r=>r.json())
.then(d=>{
document.getElementById("customOutput").innerHTML=
`<div class="card">${d.key}<br>
<button onclick="copyKey('${d.key}')">COPY</button></div>`;
});
}

// DELETE
function delKey(k){
fetch(API+"/delete",{
method:"POST",
headers:{
"user":document.getElementById("user").value.trim(),
"pass":document.getElementById("pass").value.trim(),
"Content-Type":"application/json"
},
body:JSON.stringify({key:k})
}).then(load);
}

// RESET
function resetKey(k){
fetch(API+"/reset",{
method:"POST",
headers:{
"user":document.getElementById("user").value.trim(),
"pass":document.getElementById("pass").value.trim(),
"Content-Type":"application/json"
},
body:JSON.stringify({key:k})
}).then(load);
}

// COPY
function copyKey(k){
navigator.clipboard.writeText(k);
alert("Copied");
}

</script>

</body>
</html>
