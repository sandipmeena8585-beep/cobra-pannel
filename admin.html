<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>COBRA PANEL</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:#fff;
overflow-x:hidden;
}

/* LOGIN */
.login{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}
.login input{
width:80%;
padding:14px;
margin:8px;
border:none;
border-radius:12px;
}
.login button{
width:80%;
padding:14px;
border:none;
border-radius:12px;
background:#22c55e;
}

/* SIDEBAR */
.sidebar{
position:fixed;
left:-240px;
top:0;
width:220px;
height:100%;
background:#111827;
padding:10px;
transition:0.3s;
z-index:999;
}
.sidebar button{
width:100%;
padding:12px;
margin:5px;
background:#1f2937;
color:white;
border:none;
border-radius:10px;
}

/* MENU BTN */
.menuBtn{
display:none;
position:fixed;
top:10px;
left:10px;
background:#111827;
color:white;
padding:8px;
border:none;
border-radius:8px;
z-index:1000;
}

/* OVERLAY */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
display:none;
z-index:998;
}

/* PANEL */
.panel{display:none;}
.top{
background:#111827;
padding:15px;
text-align:center;
}

.content{padding:10px;}

.card{
background:#1e293b;
padding:12px;
margin:8px;
border-radius:12px;
}

/* BUTTON */
button{
padding:10px;
border:none;
border-radius:10px;
margin:5px;
}

.green{background:#22c55e;}
.blue{background:#3b82f6;}
.red{background:#ef4444;}

/* DROPDOWN PLAN */
.planList{
display:none;
background:#1e293b;
border-radius:10px;
margin:5px;
overflow:hidden;
}

.planItem{
padding:10px;
border-bottom:1px solid #333;
}
.planItem:last-child{border:none;}
.planItem:active{background:#334155;}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="loginBox">
<h2>COBRA PANEL</h2>
<input id="user" placeholder="USERNAME">
<input id="pass" type="password" placeholder="PASSWORD">
<button onclick="login()">LOGIN</button>
</div>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">
<button onclick="show('dash')">DASHBOARD</button>
<button onclick="show('gen')">GENERATE KEY</button>
<button onclick="show('custom')">CUSTOM KEY</button>
<button onclick="logout()" class="red">LOGOUT</button>
</div>

<div id="overlay" class="overlay" onclick="closeMenu()"></div>

<button class="menuBtn" id="menuBtn" onclick="toggleMenu()">☰</button>

<!-- PANEL -->
<div class="panel" id="panel">

<div class="top">COBRA ADMIN</div>

<div class="content">

<!-- DASH -->
<div id="dash">
<h3>LIVE KEYS</h3>
</div>

<!-- GENERATE -->
<div id="gen" style="display:none;">
<h3>RANDOM KEY</h3>

<button class="green" onclick="togglePlan()">SELECT PLAN</button>

<div id="planList" class="planList">
<div class="planItem" onclick="selectPlan(1/24)">1H</div>
<div class="planItem" onclick="selectPlan(3/24)">3H</div>
<div class="planItem" onclick="selectPlan(5/24)">5H</div>
<div class="planItem" onclick="selectPlan(12/24)">12H</div>

<div class="planItem" onclick="selectPlan(1)">1DAY</div>
<div class="planItem" onclick="selectPlan(3)">3DAY</div>
<div class="planItem" onclick="selectPlan(7)">7DAY</div>
<div class="planItem" onclick="selectPlan(15)">15DAY</div>
<div class="planItem" onclick="selectPlan(30)">30DAY</div>
<div class="planItem" onclick="selectPlan(60)">60DAY</div>
</div>

<div id="selectedPlan" class="card">PLAN: NONE</div>

</div>

</div>
</div>

<script>

let PLAN=null;

// LOGIN (frontend only)
function login(){
loginBox.style.display="none";
panel.style.display="block";
menuBtn.style.display="block";
}

// MENU
function toggleMenu(){
if(sidebar.style.left==="0px"){
closeMenu();
}else{
sidebar.style.left="0px";
overlay.style.display="block";
}
}

function closeMenu(){
sidebar.style.left="-240px";
overlay.style.display="none";
}

// SWITCH
function show(id){
dash.style.display="none";
gen.style.display="none";

document.getElementById(id).style.display="block";
closeMenu();
}

// LOGOUT
function logout(){
panel.style.display="none";
loginBox.style.display="flex";
menuBtn.style.display="none";
closeMenu();
}

// PLAN DROPDOWN
function togglePlan(){
planList.style.display = planList.style.display==="block"?"none":"block";
}

// SELECT PLAN
function selectPlan(p){
PLAN = p;

let txt = p<1?(p*24)+"H":p+"DAY";
selectedPlan.innerText="PLAN: "+txt;

// auto hide
planList.style.display="none";
}

</script>

</body>
</html>
